<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 2</title>
    <link rel="stylesheet" href='../normalize.css'>
    <style rel=" stylesheet">
        *,*:before, *:after{
            -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                    box-sizing:border-box
        }

    .menu-select{
        float: 18px/1.4 arial, sans-serif;
        color: #333;
        background: #CCC;
    }

    #tudo{
        width:100%;
        max-width: 1200px;
        min-width: 860px;
        margin: 0 auto;
        background: #fff;
    }

    .clear{ clear:both;}

    body{
        font: 18px/1.4 arial, sans-serif;
        color: #333;
        background: #CCC;
    }

    h1, h2, h3, h4, h5, h6{
        color: #036;
    }

    main h1{
        margin-top: -25px;}
        .topo_header{
            background: #036;
            padding: 5px 20px;
        }

    
    
    .topo_header h1{
        font-size: 36px;
        margin: 4px 0 2px 0;
    }

    .topo_header a{
        color: #fff;
        text-decoration: none;
    }

    .topo_header h2{
        font-size: 36px;
        margin: 2px 0 4px 0;
        color: #fff;
    }

    .principal{
        width: 100%;
        padding: 20px 15px;
    }

    .rodape{
        background: #036;
        color: #fff;
        padding: 5px 0;
        text-align: center;
    }

    pre{font-size: 14px;}

    @media(max-width:1040px){
        pre{font-size: 12px;}
    }

    /*campos de formularios*/

    button, select, .bck{
        display: block;
        margin-bottom: 25px;
    }

    label[for="msg"]{
        display: block;
    }
    </style>
</head>

<body class="home">
    <div id="tudo">
    <div class="topo">
        <header class="topo_header">
            <hgroup>
                <h1><a href="/">Formularios</a></h1>
                <h2>Campos</h2>
            </hgroup>
        </header>
    </div><!--/.TOPO-->

    <div class="principal">
        <main>
            <section>
                <h1>Mais elementos para campos de formularios</h1>
            
        </main>

        <form>

            <button type="Buttom"> Botão</button>
            <select>
                <optgroup label=" frutas">
                    <option> Abacaxi</option>
                    <option> Banana</option>
                    <option> Laranja</option>
                </optgroup>

                <optgroup label="Bairros">
                    <option> Boa Vista</option>
                    <option> Lucas Rezende</option>
                    <option> Iririú</option>
                </optgroup>
            </select>

            <label class="bck">sexo
                <input name="sexo" list="sexos">
                    <datalist id="sexos">
                        <option value=" Feminino">
                        <option value=" Masculino">
                    </datalist>
            </label>

        <label for="msg"> Sua Mensagem</label>

        <textarea id="msg" rows="6" cols="30"></textarea>
       </form>
    </section>
    </div>
    <div class=" rodape">
        <footer>
            <small> Pagina desenvolvida por Lucas Rezende</small>
        </footer>
    </div>
</div>
</body>
</html>
