<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form3</title>
    <link rel="stylesheet" href='../normalize.css'>
    <style rel=" stylesheet">
        *,*:before, *:after{
            -webkit-box-sizing: border-box;
                -moz-box-sizing: border-box;
                    box-sizing:border-box
        }

    .menu-select{
        float: 18px/1.4 arial, sans-serif;
        color: #333;
        background: #CCC;
    }

    #tudo{
        width:100%;
        max-width: 1200px;
        min-width: 860px;
        margin: 0 auto;
        background: #fff;
    }

    .clear{ clear:both;}

    body{
        font: 18px/1.4 arial, sans-serif;
        color: #333;
        background: #CCC;
    }

    h1, h2, h3, h4, h5, h6{
        color: #036;
    }

    main h1{
        margin-top: -25px;}
        .topo_header{
            background: #036;
            padding: 5px 20px;
        }

    
    
    .topo_header h1{
        font-size: 36px;
        margin: 4px 0 2px 0;
    }

    .topo_header a{
        color: #fff;
        text-decoration: none;
    }

    .topo_header h2{
        font-size: 20px;
        margin: 2px 0 4px 0;
        color: #fff;
    }

    .principal{
        width: 100%;
        padding: 20px 15px;
    }

    .rodape{
        background: #036;
        color: #fff;
        padding: 5px 0;
        text-align: center;
    }

    pre{font-size: 14px;}

    @media(max-width:1040px){
        pre{font-size: 12px;}
    }

    /*campos de formularios*/

    button, select, .bck{
        display: block;
        margin-bottom: 25px;
    }

    label[for="msg"]{
        display: block;
    }
    </style>
</head>

<body class=" topo">
    <div id="tudo">
        <div class="topo">
            <header class="topo_header">
                <hgroup>
                <h1><a href="/"> Furmulario</a></h1>
                <h2> Elementos e Atributos</h2>                    
                </hgroup>
            </header>
        </div> <!-- .topo-->

        <div class="principal">
            <main>
                <section>
                    <h1>Elemento input</h1>

                    <form action="" method="">
                        <p>
                            <label> nome:
                                <input type="text" name=" nome" required> 
                            </label>
                        </p>
                        <p>
                            <label> hidden
                                <input type="hidden" name="ip"> 
                            </label>
                        </p>

                        <p>
                            <label> busca
                                <input type="search" name="q"> 
                            </label>
                        </p>
                        <p>
                            <label> telefone
                                <input type="tell" name="tel" required> 
                            </label>
                        </p>

                        <p>
                            <label> URL:
                                <input type="url" name=" url" required> 
                            </label>
                        </p>

                        <p>
                            <label> email
                                <input type="email" name="email" required> 
                            </label>
                        </p>

                        <p>
                            <label> senha
                                <input type="password" name="senha" required> 
                            </label>
                        </p>

                        <p>
                            <label> data
                                <input type="date" name="data" required> 
                            </label>
                        </p>

                        <p>
                            <label> hora
                                <input type="time" name="hora" required> 
                            </label>
                        </p>

                        <p>
                            <label> numero
                                <input type="number" name="numero" required> 
                            </label>
                        </p>

                        <p>
                            <label> Intervalo
                                <input type="range" name="faixa" required> 
                            </label>
                        </p>

                        <p>
                            <label> cor
                                <input type="color" name="cor" required> 
                            </label>
                        </p>

                        <p>
                            <label> 
                                <input type="checkbox" name=" abc"> vermelho 
                            </label>
                        </p>

                        <p>
                            <label> 
                                <input type="radio" name="cde">  Sim
                            </label>
                        </p>

                        <p>
                            <label> arquivo
                                <input type="file" name=" arquivo" required> 
                            </label>
                        </p>

                        <p>
                    
                            <input type="submit" value="ENVIAR"> 
                            
                        </p>

                        <p>
                    
                            <input type="image" src="botao.jpg" width="50" value="Botao"> 
                            
                        </p>

                        <p>
                    
                            <input type="reset" value="limpar"> 
                            
                        </p>

                        <p>
                    
                            <input type="button" value="Ok"> 
                            
                        </p>

                        
            <div class=" rodape">
        <footer>
            <small> Pagina desenvolvida por Lucas Rezende</small>
        </footer>
    </div>


                    














                    </form>




                </section>


            </main>


        </div>



    </div>
    
</body>
</html>
